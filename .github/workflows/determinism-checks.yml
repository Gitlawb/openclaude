name: determinism-checks

on:
  pull_request:
    paths:
      - "src/**"
      - "src/determinism/**"
      - "scripts/determinism/**"
      - "docs/determinism/**"
      - ".github/workflows/determinism-checks.yml"
      - "package.json"
      - "bun.lock"
      - "bun.lockb"
      - "tsconfig.json"
  push:
    branches:
      - main
      - master
    paths:
      - "src/**"
      - "src/determinism/**"
      - "scripts/determinism/**"
      - "docs/determinism/**"
      - ".github/workflows/determinism-checks.yml"
      - "package.json"
      - "bun.lock"
      - "bun.lockb"
      - "tsconfig.json"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: determinism-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

env:
  TZ: UTC
  LANG: C.UTF-8
  LC_ALL: C.UTF-8
  CI: "true"
  FORCE_COLOR: "0"
  NODE_ENV: test

jobs:
  determinism:
    name: Determinism
    runs-on: ubuntu-22.04
    timeout-minutes: 25

    steps:
      - name: Check out repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Set up Bun
        uses: oven-sh/setup-bun@4bc047ad259df6fc24a6c9b0f9a0cb08cf17fbe5 # v2.0.1
        with:
          bun-version: 1.3.11

      - name: Set up Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: 22

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Verify lockfile integrity
        shell: bash
        run: |
          set -euo pipefail
          if [ -f bun.lock ] && [ -f bun.lockb ]; then
            git diff --exit-code -- bun.lock bun.lockb package.json
          elif [ -f bun.lock ]; then
            git diff --exit-code -- bun.lock package.json
          elif [ -f bun.lockb ]; then
            git diff --exit-code -- bun.lockb package.json
          else
            echo "No Bun lockfile found" >&2
            exit 1
          fi

      - name: Run determinism test suite
        run: bun run test:determinism

      - name: Emit normalized artifacts (run1)
        shell: bash
        run: |
          set -euo pipefail
          rm -rf .artifacts/determinism/run1
          bun run determinism:emit
          mv .artifacts/determinism/local .artifacts/determinism/run1

      - name: Emit normalized artifacts (run2)
        shell: bash
        run: |
          set -euo pipefail
          rm -rf .artifacts/determinism/run2
          bun run determinism:emit
          mv .artifacts/determinism/local .artifacts/determinism/run2

      - name: Emit determinism signal summary (observed comparison)
        run: >
          bun run scripts/determinism/emit-signal-summary.ts --
          --left .artifacts/determinism/run1
          --right .artifacts/determinism/run2
          --out .artifacts/determinism/signal-summary.json

      - name: Diff normalized artifacts
        run: diff -ru .artifacts/determinism/run1 .artifacts/determinism/run2

      - name: Upload signal summary
        if: always()
        uses: actions/upload-artifact@65462800fd760344b1a7b4382951275a0abb4808 # v4.3.3
        with:
          name: determinism-signal-summary-${{ github.run_id }}
          if-no-files-found: ignore
          path: .artifacts/determinism/signal-summary.json

      - name: Upload determinism artifacts on failure
        if: failure()
        uses: actions/upload-artifact@65462800fd760344b1a7b4382951275a0abb4808 # v4.3.3
        with:
          name: determinism-artifacts-${{ github.run_id }}
          if-no-files-found: ignore
          path: |
            .artifacts/determinism/run1
            .artifacts/determinism/run2
            .artifacts/determinism/signal-summary.json

  determinism-metadata-check:
    name: Determinism Metadata Check
    runs-on: ubuntu-22.04
    timeout-minutes: 10

    steps:
      - name: Check out repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Set up Bun
        uses: oven-sh/setup-bun@4bc047ad259df6fc24a6c9b0f9a0cb08cf17fbe5 # v2.0.1
        with:
          bun-version: 1.3.11

      - name: Run determinism scanner (JSON)
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p .artifacts/determinism/guardrails
          bun run determinism:scan:json > .artifacts/determinism/guardrails/scan-report.json

      - name: Upload scanner report on failure
        if: failure()
        uses: actions/upload-artifact@65462800fd760344b1a7b4382951275a0abb4808 # v4.3.3
        with:
          name: determinism-scan-report-${{ github.run_id }}
          if-no-files-found: ignore
          path: .artifacts/determinism/guardrails/scan-report.json
