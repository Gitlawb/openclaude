name: Publish to npm on every push to main

on:
  push:
    branches: [ main ]
  workflow_dispatch:  # Allow manual trigger if needed

jobs:
  publish:
    runs-on: ubuntu-latest

    permissions:
      contents: write     # Needed to push version bump commit
      id-token: write     # Recommended for npm provenance

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'
          scope: '@fluxluffy'

      - name: Install dependencies
        run: npm ci

      - name: Build the project
        run: npm run build   # Change this if your build command is different (e.g. bun run build)

      - name: Bump version (patch)
        id: bump
        run: |
          npm version patch --no-git-tag-version
          echo "new_version=$(node -p "require('./package.json').version")" >> $GITHUB_OUTPUT

      - name: Commit version bump
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add package.json
          git commit -m "chore: bump version to ${{ steps.bump.outputs.new_version }}"
          git push

      - name: Publish to npm
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
