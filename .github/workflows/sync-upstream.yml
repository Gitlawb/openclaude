# .github/workflows/sync-upstream.yml
#
# AUTO-SYNC from Gitlawb/openclaude → your fork
# • Preserves ALL your custom files (including package.json, package-lock.json, etc.)
# • Never lets upstream delete or overwrite npm-related files
# • Opens PR for safe review (or auto-merges if AUTO_MERGE=true)

name: Sync Upstream openclaude

on:
  schedule:
    - cron: "0 */6 * * *"   # every 6 hours (less aggressive)
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  sync:
    name: Pull upstream changes (protect npm files)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout fork
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Git config
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Add upstream remote
        run: |
          git remote add upstream https://github.com/Gitlawb/openclaude.git || true
          git fetch upstream

      # ── Backup ALL your files that should never be overwritten ─────────────
      - name: Backup custom & npm files
        run: |
          mkdir -p /tmp/backup
          # Add any files/folders you want to fully protect here
          cp -r package.json /tmp/backup/ 2>/dev/null || true
          cp -r package-lock.json /tmp/backup/ 2>/dev/null || true
          cp -r src/tools/WebSearchTool/WebSearchTool.ts /tmp/backup/ 2>/dev/null || true
          
          # Add more custom files here if needed, e.g.:
          # cp -r your-custom-folder/ /tmp/backup/ 2>/dev/null || true
          
          echo "✅ Protected files backed up"

      - name: Create sync branch & merge upstream
        id: merge
        run: |
          BRANCH="sync/upstream-$(date +%Y%m%d-%H%M)"
          echo "branch=$BRANCH" >> "$GITHUB_OUTPUT"

          git checkout -b "$BRANCH"

          # Merge upstream but let our version win on conflicts (strategy-option=ours)
          if git merge upstream/main \
              --no-edit \
              --strategy-option=ours \
              --allow-unrelated-histories; then
            echo "merged=true" >> "$GITHUB_OUTPUT"
          else
            echo "merged=false" >> "$GITHUB_OUTPUT"
            git merge --abort || true
            echo "⚠️ Merge conflict — manual resolution required."
            exit 0
          fi

      # ── Restore protected files (prevents deletion + overwrite) ───────────
      - name: Restore protected files
        if: steps.merge.outputs.merged == 'true'
        run: |
          # Restore npm files
          if [ -f /tmp/backup/package.json ]; then
            cp /tmp/backup/package.json package.json
            git add package.json
          fi
          if [ -f /tmp/backup/package-lock.json ]; then
            cp /tmp/backup/package-lock.json package-lock.json
            git add package-lock.json
          fi

          # Restore your custom WebSearchTool
          if [ -f /tmp/backup/WebSearchTool.ts ]; then
            mkdir -p src/tools/WebSearchTool
            cp /tmp/backup/WebSearchTool.ts src/tools/WebSearchTool/WebSearchTool.ts
            git add src/tools/WebSearchTool/WebSearchTool.ts
          fi

          # Commit only if something actually changed
          if ! git diff --cached --quiet; then
            git commit -m "chore: restore protected files after upstream sync (package.json + custom tools)"
            echo "✅ Protected files restored"
          else
            echo "ℹ️ No changes to protected files"
          fi

      - name: Check for changes
        if: steps.merge.outputs.merged == 'true'
        id: diff
        run: |
          COUNT=$(git rev-list --count origin/main..HEAD)
          echo "commit_count=$COUNT" >> "$GITHUB_OUTPUT"
          echo "New commits ahead: $COUNT"

      # Auto-merge if enabled
      - name: Push directly to main (auto-merge)
        if: >
          steps.merge.outputs.merged == 'true' &&
          steps.diff.outputs.commit_count != '0' &&
          vars.AUTO_MERGE == 'true'
        run: |
          git checkout main
          git merge "${{ steps.merge.outputs.branch }}" --no-edit
          git push origin main
          echo "✅ Auto-merged upstream changes"

      # Safe PR mode (default)
      - name: Push sync branch
        if: >
          steps.merge.outputs.merged == 'true' &&
          steps.diff.outputs.commit_count != '0' &&
          vars.AUTO_MERGE != 'true'
        run: |
          git push origin "${{ steps.merge.outputs.branch }}"

      - name: Open Pull Request
        if: >
          steps.merge.outputs.merged == 'true' &&
          steps.diff.outputs.commit_count != '0' &&
          vars.AUTO_MERGE != 'true'
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          branch: ${{ steps.merge.outputs.branch }}
          base: main
          title: "⬆️ Sync upstream openclaude (${{ github.run_id }})"
          body: |
            Automated sync from [Gitlawb/openclaude](https://github.com/Gitlawb/openclaude).

            **Protected files preserved:**
            - `package.json`
            - `package-lock.json`
            - `src/tools/WebSearchTool/WebSearchTool.ts`
            - Any other custom files you added to the backup step

            Upstream changes applied where possible. No deletions or overwrites of your npm/publishing files.
          labels: "upstream-sync,automated"

      - name: Nothing to sync
        if: >
          steps.merge.outputs.merged == 'true' &&
          steps.diff.outputs.commit_count == '0'
        run: echo "✅ Already up-to-date with upstream."
