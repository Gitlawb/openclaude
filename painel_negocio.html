<style>
:root{--bg:#f3f4f6;--card:#fff;--text:#111827;--text2:#6b7280;--border:#e5e7eb;--primary:#1d4ed8;--primary-bg:#eff6ff;--green:#16a34a;--green-bg:#f0fdf4;--red:#dc2626;--red-bg:#fef2f2;--amber:#d97706;--amber-bg:#fffbeb;--purple:#7c3aed;--purple-bg:#f5f3ff;--radius:10px;--shadow:0 1px 3px rgba(0,0,0,.06)}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:var(--bg);color:var(--text);font-size:14px;line-height:1.5}
.container{max-width:1320px;margin:0 auto;padding:16px}
.header{background:linear-gradient(135deg,#0f172a 0%,#1e3a5f 100%);color:#fff;padding:24px 28px;border-radius:12px;margin-bottom:16px;display:flex;justify-content:space-between;align-items:center;gap:16px;flex-wrap:wrap}

.tabs{display:flex;gap:4px;background:var(--card);border-radius:var(--radius);padding:6px;margin-bottom:16px;box-shadow:var(--shadow);overflow-x:auto}
.tab{padding:10px 18px;border:0;background:0 0;cursor:pointer;border-radius:8px;font-size:.88em;font-weight:500;color:var(--text2);transition:all .15s;white-space:nowrap}
.tab:hover{background:#f1f5f9;color:var(--text)}
.tab.active{background:var(--primary);color:#fff}
.tc{display:none}.tc.active{display:block}
.card{background:var(--card);border-radius:var(--radius);padding:20px;margin-bottom:14px;box-shadow:var(--shadow)}
.card h2{font-size:1.05em;font-weight:600;margin-bottom:14px;padding-bottom:10px;border-bottom:1px solid var(--border)}
.two-col{display:grid;grid-template-columns:1fr 1fr;gap:14px}

th,td{padding:8px 12px;border-bottom:1px solid var(--border);text-align:left;white-space:nowrap}

.ss{display:flex;gap:8px;flex-wrap:wrap;align-items:center;margin-bottom:12px}

ul.cl{list-style:none;padding:0}
ul.cl li{padding:5px 0;border-bottom:1px solid var(--border);font-size:.86em}
ul.cl label{display:flex;align-items:center;gap:8px;cursor:pointer}

.alert{display:flex;justify-content:space-between;align-items:center;padding:10px 14px;border-radius:8px;margin-bottom:6px;font-size:.86em;flex-wrap:wrap;gap:8px}

@media(max-width:768px){.kpi-strip{grid-template-columns:repeat(2,1fr)}.fg{grid-template-columns:repeat(6,1fr)}.tabs{flex-wrap:wrap}.ss{flex-direction:column}}
@media print{.tabs,.btn,.ss{display:none!important}.tc{display:block!important}body{background:#fff}.card{box-shadow:none;border:1px solid var(--border)}}
</style>
</head>

function M(v){if(v===undefined||v===null||isNaN(v))v=0;var n=v<0;var a=Math.abs(v).toFixed(2).replace(/\./,',');return(n?'-R$ ':'R$ ')+a}
function P(v){return(v||0).toFixed(1)+'%'}

{q:'T4 (Mai-Jun-Jul) - Inverno',items:['Manter faturamento acima de R$ 22k/mes','Focar em acAi e potes familiares','Fechar contratos B2B para o ano seguinte']}
];

{id:'overview',label:'1. Visao Geral'},

{id:'dre',label:'3. DRE'},

{id:'stock',label:'5. Estoque'},

];

var SZ=1,fcTotal=0,dreCalc=null,activeTab=0,cfRate=0.15,winVis=false;
var stockD=LSg('stockD')||{};

/* TABS */
var nav=document.getElementById('tab-nav');
var pan=document.getElementById('panels');
var navHtml='',panHtml='';
TABS_DEF.forEach(function(t,i){
  navHtml+='<button class="tab'+(i===0?' active':'')+'" data-i="'+i+'">'+t.label+'</button>';

});

QA('#tab-nav .tab').forEach(function(btn){
  btn.addEventListener('click',function(){
    activeTab=parseInt(btn.dataset.i);
    QA('#tab-nav .tab').forEach(function(x){x.classList.remove('active')});
    btn.classList.add('active');
    QA('.tc').forEach(function(x){x.classList.remove('active')});
    document.getElementById('t-'+TABS_DEF[activeTab].id).classList.add('active');
    buildTab(activeTab);
  });
});

function szChange(){
  var sl=document.getElementById('sz-sl');
  SZ=parseFloat(sl?sl.value:1)||1;
  var vl=document.getElementById('sz-vl');
  if(vl)vl.textContent=SZ.toFixed(2);
  winVis=(SZ<=0.7);
  LSs('sz',SZ);
  buildTab(activeTab);
}

function buildTab(i){
  switch(i){
    case 0:buildOverview();break;
    case 1:buildProducts();break;
    case 2:buildDre();break;
    case 3:buildCashflow();break;
    case 4:buildStock();break;
    case 5:buildScenarios();break;
  }
}

/* CALC */
function calcAll(){
  var tr=0,tc=0,prods=[];
  PRODUCTS.forEach(function(p){
    var cel=document.querySelector('[data-pc="'+p.id+'"]');
    var cost=cel?(parseFloat(cel.value)||p.c):p.c;
    var qel=document.querySelector('[data-pq="'+p.id+'"]');
    var q=qel?(parseFloat(qel.value)||p.mq):p.mq;
    q=Math.max(0,Math.round(q*SZ*10)/10);
    var vel=document.querySelector('[data-pv="'+p.id+'"]');
    var pv=vel?(parseFloat(vel.value)||p.v):p.v;
    var rev=q*pv,cmv=q*cost;
    tr+=rev;tc+=cmv;
    prods.push({id:p.id,n:p.n,cat:p.cat,c:cost,v:pv,q:q,rev:rev,cmv:cmv,tg:p.tg});
  });
  if(winVis){
    WP.forEach(function(p){
      var qel=document.querySelector('[data-pqw="'+p.id+'"]');
      var q=qel?(parseFloat(qel.value)||p.mq):p.mq;
      q=Math.max(0,Math.round(q*SZ*10)/10);
      var rev=q*p.v,cmv=q*p.c;
      tr+=rev;tc+=cmv;
      prods.push({id:p.id,n:p.n,cat:p.cat,c:p.c,v:p.v,q:q,rev:rev,cmv:cmv,tg:p.tg});
    });
  }
  var fct=0;
  FC.forEach(function(it){
    var e=document.getElementById('d_'+it.id);
    var vv=e?(parseFloat(e.value)||0):(it.v||0);
    fct+=vv;it.v=vv;
  });
  fcTotal=fct;
  var taxR=.04,tax=tr*taxR;
  var gp=tr-tc,op=gp-fct,np=op-tax;
  var gm=tr>0?(gp/tr)*100:0,nm=tr>0?(np/tr)*100:0;
  dreCalc={rev:tr,cmv:tc,fc:fct,gp:gp,op:op,np:np,gm:gm,nm:nm,tax:tax,tR:taxR,prods:prods};
  return dreCalc;
}

function doSave(){
  var arr=PRODUCTS.map(function(p){
    var ve=document.querySelector('[data-pv="'+p.id+'"]');
    var ce=document.querySelector('[data-pb2c="'+p.id+'"]');
    var cc=document.querySelector('[data-pc="'+p.id+'"]');
    return{id:p.id,v:ve?(parseFloat(ve.value)||p.v):p.v,b2c:ce?(parseFloat(ce.value)||p.b2c):p.b2c,c:cc?(parseFloat(cc.value)||p.c):p.c};
  });
  LSs('prod3',arr);
}

function doRecalc(){calcAll();buildOverview();buildStock();}

/* ============ TAB 1: OVERVIEW ============ */
function buildOverview(){
  if(!dreCalc)dreCalc=calcAll();

/* ============ TAB 4: CASHFLOW ============ */
function buildCashflow(){
  var c=document.getElementById('t-cashflow'),h='';
  if(!dreCalc)dreCalc=calcAll();
  var base=dreCalc.rev>0?dreCalc.rev:27913;
  var fc=fcTotal;

  /* Growth slider */
  h+='<div class="card"><h2>Taxa de Crescimento Anual</h2>';
  h+='<div class="gc"><label>Crescimento:</label>';
  h+='<input type="range" id="cf-rate" min="-0.1" max="0.5" step="0.01" value="'+cfRate+'" oninput="cfRate=parseFloat(this.value);buildTab(3)" style="flex:1;max-width:400px;accent-color:var(--primary)">';
  h+='<span class="gv">'+(cfRate*100).toFixed(0)+'% ao ano</span></div>';
  h+='<div style="display:flex;gap:8px;margin-top:8px;flex-wrap:wrap">';
  h+='<button class="btn bs" onclick="document.getElementById(\'cf-rate\').value=-0.05;cfRate=-0.05;buildTab(3)">Queda 5%</button>';
  h+='<button class="btn bs btno" onclick="document.getElementById(\'cf-rate\').value=0.07;cfRate=0.07;buildTab(3)">+7% Conservador</button>';
  h+='<button class="btn bs btni" onclick="document.getElementById(\'cf-rate\').value=0.15;cfRate=0.15;buildTab(3)">+15% Realista</button>';
  h+='<button class="btn bs btns" onclick="document.getElementById(\'cf-rate\').value=0.36;cfRate=0.36;buildTab(3)">+36% Otimista</button>';
  h+='</div></div>';

  /* Calculate projections */
  var cum=0,details=[],maxAbs=1;
  var mr=cfRate/12;
  for(var i=0;i<12;i++){
    var rev=Math.round(base*Math.pow(1+mr,i));
    var cEst=Math.round(rev*.48);
    var profit=rev-cEst-fc;
    cum+=profit;
    details.push({m:MONTHS[i],rev:rev,cEst:cEst,fc:fc,pr:profit,cum:cum});
    if(Math.abs(profit)>maxAbs)maxAbs=Math.abs(profit);
  }

  /* Monthly cards */
  h+='<div class="card"><h2>Projecao Mensal de Fluxo de Caixa</h2><div class="fg">';
  for(var i=0;i<12;i++){
    var d=details[i];
    var pc2=d.pr>=0?'pos':'neg';
    h+='<div class="fm '+pc2+'"><div class="mn">'+MONTHS[i]+'</div>';
    h+='<div class="mv">'+M(d.pr)+'</div><div class="ms">Acum: '+M(d.cum)+'</div></div>';
  }
  h+='</div>';

  /* Table */
  h+='<div style="margin-top:14px"><table><thead><tr>';
  h+='<th>Mes</th><th class="r">Faturamento</th><th class="r">CMV (48%)</th><th class="r">Custos Fixos</th><th class="r">Resultado</th><th class="r">Acumulado</th>';
  h+='</tr></thead><tbody>';
  details.forEach(function(d){
    h+='<tr><td><strong>'+d.m+'</strong></td><td class="r">'+M(d.rev)+'</td><td class="r">'+M(d.cEst)+'</td>';
    h+='<td class="r">'+M(d.fc)+'</td><td class="r '+TC(d.pr)+'">'+M(d.pr)+'</td>';
    h+='<td class="r '+TC(d.cum)+'" style="font-weight:700">'+M(d.cum)+'</td></tr>';
  });
  h+='</tbody></table></div></div>';

  /* Emergency reserve */
  var emTarget=fc*3;
  var lastCum=details[11].cum;
  var beMonth='Nao neste cenario';
  for(var j=0;j<details.length;j++){if(details[j].cum>=0){beMonth=details[j].m;break;}}

  h+='<div class="card"><h2>Reserva de Emergencia</h2><div class="ir">';
  h+='<div class="ic"><div class="il">Meta (3x Custos Fixos)</div><div class="iv">'+M(emTarget)+'</div><div class="is">Cobrir 3 meses de custos fixos</div></div>';
  h+='<div class="ic"><div class="il">Projecao Acumulada (Dez)</div><div class="iv" style="color:'+(lastCum>=0?'var(--green)':'var(--red)')+'">'+M(lastCum)+'</div><div class="is">'+(lastCum>=emTarget?'Reserva atingida!':'Faltam '+M(emTarget-lastCum))+'</div></div>';
  h+='<div class="ic"><div class="il">Mes Break-Even</div><div class="iv">'+beMonth+'</div><div class="is">Quando o acumulado se torna positivo</div></div>';
  h+='</div></div>';
  c.innerHTML=h;
}

  h+='<div class="tw"><table><thead><tr>';
  h+='<th>Produto</th><th>Categoria</th><th class="r">Qtd Atual</th><th class="r">Qtd Min.</th><th class="r">Valor</th><th>Status</th><th style="min-width:100px">Nivel</th>';
  h+='</tr></thead><tbody>';
  PRODUCTS.forEach(function(p){
    var s=stockD[p.id];
    var lv=s.mn>0?Math.min(100,(s.q/(s.mn*2)*100)):100;
    var st,dc,pc;
    if(s.q<=s.mn){st='Critico';dc='d-r';pc='p-r'}
    else if(s.q<=s.mn*2){st='Atencao';dc='d-y';pc='p-y'}
    else{st='OK';dc='d-g';pc='p-g'}
    var sv=s.q*p.c;
    h+='<tr><td><strong>'+H(p.n)+'</strong></td><td>'+H(p.cat)+'</td>';
    h+='<td class="r"><input type="number" name="sk-'+p.id+'" value="'+s.q+'" step="1" min="0" oninput="onStock()" style="width:75px"></td>';
    h+='<td class="r"><input type="number" name="sm-'+p.id+'" value="'+s.mn+'" step="1" min="0" oninput="onStock()" style="width:65px"></td>';
    h+='<td class="r">'+M(sv)+'</td>';
    h+='<td><div style="display:flex;align-items:center;gap:5px"><span class="dot '+dc+'"></span>'+st+'</div></td>';
    h+='<td><div class="pb"><div class="pf '+pc+'" style="width:'+lv.toFixed(0)+'%"></div></div></td></tr>';
  });
  h+='</tbody></table></div></div>';

  /* Reorder alerts */
  h+='<div class="card"><h2>Ordens de Reposicao</h2>';
  var hasA=false;
  PRODUCTS.forEach(function(p){
    var s=stockD[p.id];
    if(s.q<=s.mn){
      hasA=true;
      h+='<div class="alert alert-r"><div><strong>'+H(p.n)+'</strong> estoque ('+s.q+') abaixo do minimo ('+s.mn+')</div>';
      h+='<button class="btn bs btnd">Gerar Pedido</button></div>';
    } else if(s.q<=s.mn*2){
      hasA=true;
      h+='<div class="alert alert-y"><div><strong>'+H(p.n)+'</strong> estoque ('+s.q+') proximo do minimo ('+s.mn+')</div>';
      h+='<span class="badge b-y">Monitorar</span></div>';
    }
  });
  if(!hasA)h+='<p style="color:var(--green);font-size:.9em;padding:12px">Todos os produtos com estoque adequado.</p>';
  h+='</div>';
  c.innerHTML=h;
}

function onStock(){
  var qel=document.querySelectorAll('[name^="sk-"]');
  var mel=document.querySelectorAll('[name^="sm-"]');
  for(var i=0;i<qel.length;i++){
    var id=qel[i].name.replace('sk-','');
    if(stockD[id])stockD[id].q=parseFloat(qel[i].value)||0;
  }
  for(var j=0;j<mel.length;j++){
    var id=mel[j].name.replace('sm-','');
    if(stockD[id])stockD[id].mn=parseFloat(mel[j].value)||0;
  }
  buildStock();
}

function loadDefStock(){
  PRODUCTS.forEach(function(p){stockD[p.id]={q:p.mq*2,mn:p.mq}});
  buildStock();
}

/* ============ TAB 6: SCENARIOS ============ */
function buildScenarios(){
  var c=document.getElementById('t-scenarios'),h='';

  /* Save/load */
  h+='<div class="card"><h2>Salvar / Carregar / Comparar Cenarios</h2>';
  h+='<div class="ss">';
  h+='<input type="text" id="sc-nm" placeholder="Nome do cenario (ex: Verao 2026)">';
  h+='<button class="btn bs btns" onclick="saveSc()">Salvar</button>';
  h+='<select id="sc-sel"></select>';
  h+='<button class="btn bs btni" onclick="loadSc()">Carregar</button>';
  h+='<button class="btn bs btnw" onclick="cmpSc()">Comparar</button>';
  h+='<button class="btn bs btnd" onclick="delSc()">Excluir</button>';
  h+='</div><div id="cmp-res"></div></div>';

  /* KPIs */
  h+='<div class="card"><h2>KPIs - Meta vs Realizado</h2>';
  h+='<div class="tw"><table><thead><tr>';
  h+='<th>KPI</th><th class="r">Atual</th><th class="r">Meta 3 Meses</th><th class="r">Meta 12 Meses</th><th style="min-width:120px">Progresso</th>';
  h+='</tr></thead><tbody>';
  KPIDATA.forEach(function(k,i){
    var prog=k.inv?Math.max(0,Math.min(100,(1-k.a/(k.t12||1))*100)):Math.max(0,Math.min(100,(k.a/(k.t12||1))*100));
    var bc=prog>=80?'p-g':prog>=50?'p-y':'p-r';
    var fv=k.f==='m'?M(k.a):k.f==='p'?k.a+'%':''+k.a;
    var ft3=k.f==='m'?M(k.t3):k.f==='p'?k.t3+'%':''+k.t3;
    var ft12=k.f==='m'?M(k.t12):k.f==='p'?k.t12+'%':''+k.t12;
    var aStep=k.f==='m'?10:k.f==='p'?1:1;
    h+='<tr><td>'+H(k.k)+'</td>';
    h+='<td class="r"><input type="number" data-kpi-a="'+i+'" value="'+k.a+'" step="'+aStep+'" style="width:80px" oninput="editKpi('+i+',\'a\',this.value)"></td>';
    h+='<td class="r"><input type="number" data-kpi-t3="'+i+'" value="'+k.t3+'" step="'+aStep+'" style="width:80px" oninput="editKpi('+i+',\'t3\',this.value)"></td>';
    h+='<td class="r"><input type="number" data-kpi-t12="'+i+'" value="'+k.t12+'" step="'+aStep+'" style="width:80px" oninput="editKpi('+i+',\'t12\',this.value)"></td>';
    h+='<td><div class="pb"><div class="pf '+bc+'" style="width:'+prog.toFixed(0)+'%"></div></div>';
    h+='<div style="font-size:.7em;color:var(--text2);text-align:center">'+prog.toFixed(0)+'%</div></td></tr>';
  });
  h+='</tbody></table></div>';
  h+='<div style="display:flex;gap:8px;margin-top:10px;flex-wrap:wrap">';
  h+='<button class="btn bs btns" onclick="saveKpis()">Salvar KPIs</button>';
  h+='<button class="btn bs btno" onclick="resetKpis()">Restaurar Padrao</button>';
  h+='</div></div>';

  /* Goals checklist */
  h+='<div class="card"><h2>Metas Trimestrais (edite ou adicione metas)</h2>';
  h+='<div class="ss"><button class="btn bs btns" onclick="saveGoals()">Salvar Metas</button></div>';
  var savedG=LSg('goals3')||{};
  GOALS.forEach(function(q,qi){
    h+='<h3 style="font-size:.92em;margin:10px 0 6px;color:var(--text2)">'+H(q.q)+'</h3>';
    h+='<ul class="cl">';
    q.items.forEach(function(item,idx){
      var key=qi+'|'+idx;
      var checked=!!savedG[key];
      h+='<li><label><input type="checkbox" data-gk="'+key+'"'+(checked?' checked':'')+' onchange="togGoal(this)">';
      h+='<span'+(checked?' class="done2"':'')+'>'+H(item)+'</span></label></li>';
    });
    h+='<li style="padding:4px 0"><input type="text" data-ga="'+qi+'" placeholder="+ Nova meta..." style="width:100%;font-size:.83em" onkeydown="addGoal(event,'+qi+')"></li>';
    h+='</ul>';
  });
  h+='</div>';
  c.innerHTML=h;
  refScSel();
}

/* KPI EDIT */
function editKpi(idx,field,val){
  KPIDATA[idx][field]=parseFloat(val)||0;
  saveKpis();
}
function saveKpis(){
  var data=KPIDATA.map(function(k){return{k:k.k,a:k.a,t3:k.t3,t12:k.t12,f:k.f,inv:k.inv?1:0}});
  LSs('kpi5',data);
}
function resetKpis(){
  var def=[
    {k:'Faturamento mensal',a:27913,t3:30000,t12:40000,f:'m'},
    {k:'Dias sem vendas/mes',a:9,t3:5,t12:2,f:'n',inv:1},
    {k:'Margem bruta media',a:50,t3:55,t12:60,f:'p'},
    {k:'Ticket medio por venda',a:553,t3:600,t12:750,f:'m'},
    {k:'Clientes B2B ativos',a:0,t3:5,t12:15,f:'n'},
    {k:'Revendedores ativos',a:0,t3:5,t12:20,f:'n'}
  ];
  def.forEach(function(d,i){
    for(var k2 in d){KPIDATA[i][k2]=d[k2]}
  });
  buildScenarios();
}

function addGoal(e,qi){
  if(e.key!=='Enter')return;
  var inp=document.querySelector('[data-ga="'+qi+'"]');
  var val=inp?inp.value.trim():'';if(!val)return;
  GOALS[qi].items.push(val);
  buildScenarios();
}
function saveGoals(){
  var data={};
  GOALS.forEach(function(q,qi){
    q.items.forEach(function(item,idx){
      var key=qi+'|'+idx;
      var cb=document.querySelector('[data-gk="'+key+'"]');
      data[key]=cb?cb.checked:false;
    });
  });
  LSs('goals3',data);
}

function togGoal(cb){
  var key=cb.getAttribute('data-gk');
  var sg=LSg('goals3')||{};
  sg[key]=cb.checked;
  LSs('goals3',sg);
  var span=cb.parentElement.querySelector('span');
  if(span){span.className=cb.checked?'done2':''}
}

function saveSc(){
  var nmEl=document.getElementById('sc-nm');
  var nm=nmEl?nmEl.value.trim():'';
  if(!nm){alert('Digite um nome para o cenario');return}
  var m=calcAll();
  var sl=document.getElementById('sz-sl');
  var szv=sl?(parseFloat(sl.value)||1):1;
  var scs=LSg('scen3')||{};
  var prods=PRODUCTS.map(function(p){return{id:p.id,v:p.v,b2c:p.b2c,c:p.c}});
  var fcv={};FC.forEach(function(it){var e=document.getElementById('d_'+it.id);fcv[it.id]=e?(parseFloat(e.value)||0):0});
  var pqArr=PRODUCTS.map(function(p){
    var els=document.querySelectorAll('[data-pq="'+p.id+'"]');
    return{id:p.id,q:els&&els.length>0?(parseFloat(els[0].value)||p.mq):p.mq};
  });
  scs[nm]={products:prods,quantities:pqArr,seasonal:szv,fc:fcv,
    dre:{rev:m.rev,cmv:m.cmv,gp:m.gp,gm:m.gm,fc:m.fc,op:m.op,np:m.np,nm:m.nm},
    dt:new Date().toLocaleString('pt-BR')
  };
  LSs('scen3',scs);
  refScSel();
  alert('Cenario "'+nm+'" salvo!\n\nReceita: '+M(m.rev)+'\nLucro Liquido: '+M(m.np)+' ('+P(m.nm)+')\nSazonalidade: '+szv.toFixed(2));
}

function loadSc(){
  var nm=document.getElementById('sc-sel').value;
  if(!nm){alert('Selecione um cenario');return}
  var scs=LSg('scen3')||{};var sc=scs[nm];
  if(!sc){alert('Cenario nao encontrado');return}
  if(sc.seasonal!==undefined){
    var sl=document.getElementById('sz-sl');
    if(sl){sl.value=sc.seasonal;szChange();}
  }
  if(sc.products){
    sc.products.forEach(function(pr){
      var p=PRODUCTS.find(function(x){return x.id===pr.id});
      if(p){if(pr.v!==undefined)p.v=pr.v;if(pr.b2c!==undefined)p.b2c=pr.b2c;if(pr.c!==undefined)p.c=pr.c}
    });
  }
  if(sc.fc){
    for(var id in sc.fc){
      var e=document.getElementById('d_'+id);if(e)e.value=sc.fc[id];
    }
  }
  if(sc.quantities){
    sc.quantities.forEach(function(pq){
      var els=document.querySelectorAll('[data-pq="'+pq.id+'"]');
      if(els&&els.length>0)els[0].value=pq.q;
    });
  }
  buildTab(activeTab);
}

function delSc(){
  var nm=document.getElementById('sc-sel').value;
  if(!nm){alert('Selecione um cenario');return}
  if(!confirm('Excluir cenario "'+nm+'"?'))return;
  var scs=LSg('scen3')||{};delete scs[nm];LSs('scen3',scs);refScSel();
  var cr=document.getElementById('cmp-res');if(cr)cr.innerHTML='';
}

function cmpSc(){
  var scs=LSg('scen3')||{};
  var nms=Object.keys(scs);
  if(nms.length<2){alert('Salve pelo menos 2 cenarios para comparar.');return}
  var d=document.getElementById('cmp-res');
  var h='<table style="margin-top:8px"><thead><tr><th>Metrica</th>';
  nms.forEach(function(n){h+='<th>'+H(n)+'</th>'});
  h+='</tr></thead><tbody>';
  var metrics=[
    {l:'Receita Bruta',k:'rev',f:'m'},{l:'CMV',k:'cmv',f:'m'},
    {l:'Lucro Bruto',k:'gp',f:'m'},{l:'Margem Bruta',k:'gm',f:'p'},
    {l:'Custos Fixos',k:'fc',f:'m'},{l:'Resultado Oper.',k:'op',f:'m'},
    {l:'Resultado Liquido',k:'np',f:'m'},{l:'Margem Liquida',k:'nm',f:'p'}
  ];
  metrics.forEach(function(met){
    h+='<tr><td><strong>'+H(met.l)+'</strong></td>';
    nms.forEach(function(n){
      var dr=scs[n].dre;
      var val=dr&&dr[met.k]!==undefined?dr[met.k]:null;
      var cls=val!==null?(met.f==='m'?TC(val):(parseFloat(val)>=0?'pos':'neg')):'';
      var tv=val!==null?(met.f==='p'?val+'%':M(val)):'-';
      h+='<td class="r '+cls+'">'+tv+'</td>';
    });
    h+='</tr>';
  });
  h+='<tr><td>Sazonalidade</td>';
  nms.forEach(function(n){h+='<td class="r">'+(scs[n].seasonal||1).toFixed(2)+'</td>'});
  h+='</tr><tr><td>Data</td>';
  nms.forEach(function(n){h+='<td class="r">'+H(scs[n].dt||'-')+'</td>'});
  h+='</tr></tbody></table>';
  d.innerHTML=h;
}

function refScSel(){
  var scs=LSg('scen3')||{};
  var sel=document.getElementById('sc-sel');
  if(!sel)return;
  var h='<option value="">-- selecionar cenario --</option>';
  Object.keys(scs).forEach(function(nm){
    var sc=scs[nm];
    var info=sc.dre?' (Liq:'+M(sc.dre.np||0)+')':'';
    h+='<option value="'+H(nm)+'">'+H(nm)+info+'</option>';
  });
  sel.innerHTML=h;
}

/* ============ INIT ============ */
function init(){
  /* Load saved products (price, b2c, cost) */
  var sp=LSg('prod3');
  if(sp){sp.forEach(function(pr){var p=PRODUCTS.find(function(x){return x.id===pr.id});if(p){if(pr.v!==undefined&&!isNaN(pr.v)&&pr.v>=0)p.v=pr.v;if(pr.b2c!==undefined&&!isNaN(pr.b2c)&&pr.b2c>=0)p.b2c=pr.b2c;if(pr.c!==undefined&&!isNaN(pr.c)&&pr.c>=0)p.c=pr.c}})}
  /* Load fixed costs */
  var sf=LSg('fc2');
  if(sf){FC.forEach(function(it){if(sf[it.id]!==undefined)it.v=sf[it.id]})}
  /* Load seasonal */
  var ssz=LSg('sz');
  if(ssz!==null){SZ=ssz;if(SZ<=0.7)winVis=true}
  /* Load KPIs */
  var skpi=LSg('kpi5');
  if(skpi&&skpi.length===KPIDATA.length){skpi.forEach(function(d,i){KPIDATA[i].a=d.a;KPIDATA[i].t3=d.t3;KPIDATA[i].t12=d.t12})}
  /* Load quantities */
  var spq=LSg('pq3');
  if(spq){PRODUCTS.forEach(function(p){if(spq[p.id]!==undefined){var v=spq[p.id];if(!isNaN(v)&&v>=0&&v<10000)p.mq=v}})}

  buildOverview();
  buildProducts();
  buildDre();
  buildCashflow();
  buildStock();
  buildScenarios();

  /* Auto-save global (after init) */
  var _ready=true;
  document.addEventListener('input',function(e){
    if(!_ready)return;
    var t=e.target;
    if(t.hasAttribute('data-pv')||t.hasAttribute('data-pb2c')||t.hasAttribute('data-pc')){doSave()}
    if(t.id&&t.id.indexOf('d_')===0){
      var fcv={};FC.forEach(function(it){var el=document.getElementById('d_'+it.id);fcv[it.id]=el?(parseFloat(el.value)||0):0});
      LSs('fc2',fcv);
    }
    if(t.hasAttribute('data-pq')){
      var pq={};PRODUCTS.forEach(function(p){var el=document.querySelector('[data-pq="'+p.id+'"]');pq[p.id]=el?(parseFloat(el.value)||p.mq):p.mq});
      LSs('pq3',pq);
    }
    if(t.id==='sz-sl'){var sz=parseFloat(t.value)||1;winVis=(sz<=0.7);LSs('sz',sz)}
  });
}

window.onload=init;
</script>
</body>
</html>
