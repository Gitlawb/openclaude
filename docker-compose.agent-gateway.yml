      EXA_API_KEY: "${EXA_API_KEY:-}"
      YOU_API_KEY: "${YOU_API_KEY:-}"
      JINA_API_KEY: "${JINA_API_KEY:-}"
      BING_API_KEY: "${BING_API_KEY:-}"
      MOJEEK_API_KEY: "${MOJEEK_API_KEY:-}"
      LINKUP_API_KEY: "${LINKUP_API_KEY:-}"
      MCPR_TOKEN: "${MCPR_TOKEN:-}"
      MCPR_HOST: "${MCPR_HOST:-host.docker.internal}"
      MCPR_PORT: "${MCPR_PORT:-3282}"
      OPENRAG_URL: "${OPENCLAUDE_DOCKER_OPENRAG_URL:-${OPENRAG_URL:-http://host.docker.internal:3000}}"
      OPENRAG_API_KEY: "${OPENRAG_API_KEY:-}"
      OPENRAG_MCP_TIMEOUT: "${OPENRAG_MCP_TIMEOUT:-60}"
