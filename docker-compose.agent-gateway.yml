services:
  openclaude-agent:
    build:
      context: .
    image: openclaude-agent:local
    command: ["--agent-gateway-server"]
    stdin_open: true
    tty: true
    environment:
      OPENCLAUDE_AGENT_API_ENABLED: "1"
      OPENCLAUDE_AGENT_API_HOST: "0.0.0.0"
      OPENCLAUDE_AGENT_API_PORT: "8642"
      OPENCLAUDE_AGENT_API_KEY: "${OPENCLAUDE_AGENT_API_KEY:-change-me}"
      OPENCLAUDE_AGENT_CRON_ENABLED: "${OPENCLAUDE_AGENT_CRON_ENABLED:-1}"
      OPENCLAUDE_AGENT_CRON_TICK_SECONDS: "${OPENCLAUDE_AGENT_CRON_TICK_SECONDS:-60}"
      OPENCLAUDE_TELEGRAM_ENABLED: "${OPENCLAUDE_DOCKER_TELEGRAM_ENABLED:-0}"
      TELEGRAM_BOT_TOKEN: "${OPENCLAUDE_DOCKER_TELEGRAM_BOT_TOKEN:-}"
      OPENCLAUDE_TELEGRAM_HOME_CHAT_ID: "${OPENCLAUDE_DOCKER_TELEGRAM_HOME_CHAT_ID:-}"
      OPENCLAUDE_TELEGRAM_ALLOWED_CHAT_IDS: "${OPENCLAUDE_DOCKER_TELEGRAM_ALLOWED_CHAT_IDS:-}"
      OPENCLAUDE_TELEGRAM_ALLOWED_USER_IDS: "${OPENCLAUDE_DOCKER_TELEGRAM_ALLOWED_USER_IDS:-}"
      OPENCLAUDE_TELEGRAM_DOWNLOAD_FILES: "${OPENCLAUDE_TELEGRAM_DOWNLOAD_FILES:-1}"
      OPENCLAUDE_TELEGRAM_MAX_DOWNLOAD_BYTES: "${OPENCLAUDE_TELEGRAM_MAX_DOWNLOAD_BYTES:-20971520}"
      OPENCLAUDE_TELEGRAM_MAX_UPLOAD_BYTES: "${OPENCLAUDE_TELEGRAM_MAX_UPLOAD_BYTES:-52428800}"
      OPENCLAUDE_TELEGRAM_TRANSCRIBE_AUDIO: "${OPENCLAUDE_TELEGRAM_TRANSCRIBE_AUDIO:-1}"
      OPENCLAUDE_TELEGRAM_TRANSCRIPTION_PROVIDER: "${OPENCLAUDE_TELEGRAM_TRANSCRIPTION_PROVIDER:-auto}"
      OPENCLAUDE_TELEGRAM_TRANSCRIPTION_WHISPER_MODEL: "${OPENCLAUDE_TELEGRAM_TRANSCRIPTION_WHISPER_MODEL:-base}"
      OPENCLAUDE_TELEGRAM_TRANSCRIPTION_OPENAI_MODEL: "${OPENCLAUDE_TELEGRAM_TRANSCRIPTION_OPENAI_MODEL:-whisper-1}"
      OPENCLAUDE_OUROBOROS_ENABLED: "${OPENCLAUDE_OUROBOROS_ENABLED:-0}"
      OPENCLAUDE_CONSCIOUSNESS_ENABLED: "${OPENCLAUDE_CONSCIOUSNESS_ENABLED:-0}"
      OPENCLAUDE_INFINITE_TASKS_ENABLED: "${OPENCLAUDE_INFINITE_TASKS_ENABLED:-0}"
      OPENCLAUDE_OUROBOROS_WAKEUP_MIN_SECONDS: "${OPENCLAUDE_OUROBOROS_WAKEUP_MIN_SECONDS:-300}"
      OPENCLAUDE_OUROBOROS_WAKEUP_MAX_SECONDS: "${OPENCLAUDE_OUROBOROS_WAKEUP_MAX_SECONDS:-7200}"
      OPENCLAUDE_OUROBOROS_MAX_ROUNDS: "${OPENCLAUDE_OUROBOROS_MAX_ROUNDS:-3}"
      OPENCLAUDE_OUROBOROS_BUDGET_FRACTION: "${OPENCLAUDE_OUROBOROS_BUDGET_FRACTION:-0.1}"
      OPENCLAUDE_AGENT_RUNNER_CWD: "${OPENCLAUDE_DOCKER_RUNNER_CWD:-/workspace}"
      OPENCLAUDE_AGENT_RUNNER_MAX_TURNS: "${OPENCLAUDE_AGENT_RUNNER_MAX_TURNS:-12}"
      OPENCLAUDE_AGENT_RUNNER_TIMEOUT_MS: "${OPENCLAUDE_AGENT_RUNNER_TIMEOUT_MS:-180000}"
      OPENCLAUDE_AGENT_RUNNER_PERMISSION_MODE: "${OPENCLAUDE_AGENT_RUNNER_PERMISSION_MODE:-bypassPermissions}"
      OPENCLAUDE_AGENT_RUNNER_TOOLS: "${OPENCLAUDE_AGENT_RUNNER_TOOLS:-}"
      OPENCLAUDE_AGENT_RUNNER_DISALLOWED_TOOLS: "${OPENCLAUDE_AGENT_RUNNER_DISALLOWED_TOOLS:-}"
      CLAUDE_CODE_USE_OPENAI: "${CLAUDE_CODE_USE_OPENAI:-}"
      CLAUDE_CODE_USE_GEMINI: "${CLAUDE_CODE_USE_GEMINI:-}"
      CLAUDE_CODE_USE_MISTRAL: "${CLAUDE_CODE_USE_MISTRAL:-}"
      CLAUDE_CODE_USE_GITHUB: "${CLAUDE_CODE_USE_GITHUB:-}"
      CLAUDE_CODE_USE_BEDROCK: "${CLAUDE_CODE_USE_BEDROCK:-}"
      CLAUDE_CODE_USE_VERTEX: "${CLAUDE_CODE_USE_VERTEX:-}"
      CLAUDE_CODE_USE_FOUNDRY: "${CLAUDE_CODE_USE_FOUNDRY:-}"
      OPENCLAUDE_PROVIDER: "${OPENCLAUDE_DOCKER_PROVIDER:-${OPENCLAUDE_PROVIDER:-}}"
      OPENCLAUDE_BASE_URL: "${OPENCLAUDE_DOCKER_BASE_URL:-${OPENCLAUDE_BASE_URL:-}}"
      OPENCLAUDE_MODEL: "${OPENCLAUDE_DOCKER_MODEL:-${OPENCLAUDE_MODEL:-}}"
      OPENCLAUDE_API_KEY: "${OPENCLAUDE_DOCKER_API_KEY:-${OPENCLAUDE_API_KEY:-}}"
      OPENAI_BASE_URL: "${OPENCLAUDE_DOCKER_BASE_URL:-${OPENAI_BASE_URL:-}}"
      OPENAI_MODEL: "${OPENCLAUDE_DOCKER_MODEL:-${OPENAI_MODEL:-}}"
      OPENAI_API_KEY: "${OPENCLAUDE_DOCKER_API_KEY:-${OPENAI_API_KEY:-}}"
      CODEX_API_KEY: "${CODEX_API_KEY:-}"
      CODEX_CREDENTIAL_SOURCE: "${CODEX_CREDENTIAL_SOURCE:-}"
      CHATGPT_ACCOUNT_ID: "${CHATGPT_ACCOUNT_ID:-}"
      CODEX_ACCOUNT_ID: "${CODEX_ACCOUNT_ID:-}"
      ANTHROPIC_API_KEY: "${ANTHROPIC_API_KEY:-}"
      ANTHROPIC_MODEL: "${ANTHROPIC_MODEL:-}"
      ANTHROPIC_BASE_URL: "${ANTHROPIC_BASE_URL:-}"
      GEMINI_API_KEY: "${GEMINI_API_KEY:-}"
      GOOGLE_API_KEY: "${GOOGLE_API_KEY:-}"
      GEMINI_MODEL: "${GEMINI_MODEL:-}"
      GEMINI_BASE_URL: "${GEMINI_BASE_URL:-}"
      MISTRAL_API_KEY: "${MISTRAL_API_KEY:-}"
      MISTRAL_MODEL: "${MISTRAL_MODEL:-}"
      MISTRAL_BASE_URL: "${MISTRAL_BASE_URL:-}"
      WEB_SEARCH_PROVIDER: "${WEB_SEARCH_PROVIDER:-auto}"
      WEB_PROVIDER: "${WEB_PROVIDER:-}"
      WEB_KEY: "${WEB_KEY:-}"
      WEB_SEARCH_API: "${WEB_SEARCH_API:-}"
      WEB_QUERY_PARAM: "${WEB_QUERY_PARAM:-}"
      WEB_METHOD: "${WEB_METHOD:-}"
      WEB_PARAMS: "${WEB_PARAMS:-}"
      WEB_URL_TEMPLATE: "${WEB_URL_TEMPLATE:-}"
      WEB_BODY_TEMPLATE: "${WEB_BODY_TEMPLATE:-}"
      WEB_AUTH_HEADER: "${WEB_AUTH_HEADER:-}"
      WEB_AUTH_SCHEME: "${WEB_AUTH_SCHEME:-}"
      WEB_HEADERS: "${WEB_HEADERS:-}"
      WEB_JSON_PATH: "${WEB_JSON_PATH:-}"
      WEB_CUSTOM_TIMEOUT_SEC: "${WEB_CUSTOM_TIMEOUT_SEC:-}"
