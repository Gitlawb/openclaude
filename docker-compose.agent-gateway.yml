      CAMOFOX_MCP_TIMEOUT: "${CAMOFOX_MCP_TIMEOUT:-60}"
      HINDSIGHT_URL: "${OPENCLAUDE_DOCKER_HINDSIGHT_URL:-${HINDSIGHT_URL:-http://host.docker.internal:8888}}"
      HINDSIGHT_API_KEY: "${HINDSIGHT_API_KEY:-}"
      HINDSIGHT_BANK_ID: "${HINDSIGHT_BANK_ID:-openclaude-agent}"
      HINDSIGHT_MCP_TIMEOUT: "${HINDSIGHT_MCP_TIMEOUT:-60}"
    ports:
      - "${OPENCLAUDE_AGENT_API_HOST_PORT:-8642}:8642"
    volumes:
      - openclaude-config:/home/node/.openclaude
      - ./:/workspace
    extra_hosts:
      - "host.docker.internal:host-gateway"
    working_dir: /workspace
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "node -e \"fetch('http://127.0.0.1:8642/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))\"",
        ]
      interval: 15s
      timeout: 5s
      retries: 12
      start_period: 20s

